<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>智慧课堂系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#081423;color:#fff;font-family:"Microsoft YaHei"}
header{height:70px;line-height:70px;text-align:center;background:#0d2238;color:#00eaff;font-size:36px;font-weight:bold}
.toolbar{padding:12px;background:#11263d;text-align:center}
select{padding:8px 16px;font-size:18px}
.container{display:flex;height:calc(100vh - 118px)}
.left{width:75%;padding:16px}
.right{width:25%;padding:16px}
.cards{display:flex;gap:12px;margin-bottom:16px}
.card{flex:1;background:#11263d;border-radius:10px;padding:16px;text-align:center}
.card h3{font-size:20px;margin-bottom:10px}
.value{font-size:42px;color:#00ff90;font-weight:bold}
.image-box{height:720px;background:#0e2034;border-radius:10px;display:flex;align-items:center;justify-content:center}
.image-box img{max-width:100%;max-height:100%;object-fit:contain}
.panel{background:#11263d;border-radius:10px;padding:18px;line-height:2;font-size:20px}
</style>
</head>
<body>
<header>智慧课堂系统</header>
<div class="toolbar">
教室：
<select id="classroom">
<option>A5-101</option><option>A5-102</option><option>A5-103</option><option>A5-104</option><option>A5-105</option>
</select>
</div>
<div class="container">
<div class="left">
<div class="cards">
<div class="card"><h3>👥 当前人数</h3><div class="value" id="personCount">0</div></div>
<div class="card"><h3>📱 玩手机人数</h3><div class="value" id="phoneCount">0</div></div>
<div class="card"><h3>🪑 前3排人数</h3><div class="value" id="frontCount">0</div></div>
<div class="card"><h3>👀 注意力</h3><div class="value" id="attention">100%</div></div>
</div>
<div class="image-box"><img id="detectImage" alt="检测结果"></div>
</div>
<div class="right">
<div class="panel">
<div>状态：<span id="apiStatus">等待连接</span></div>
<div>模型:YOLOv8</div>
<div>更新时间：<span id="updateTime">--</span></div>
<div>刷新频率:1.5 秒</div>
</div>
</div>
</div>
<script>
let index=1;
const maxImage=5;
function clock(){
 const d=new Date();
 document.getElementById("updateTime").textContent=d.toLocaleTimeString();
}
async function updateDashboard(){
 const room=document.getElementById("classroom").value;
 const imageName=`PartA_${String(index).padStart(5,'0')}.jpg`;
 const url=`http://127.0.0.1:8000/detect?image_name=${imageName}&classroom=${room}`;
 try{
   const r=await fetch(url);
   const data=await r.json();
   document.getElementById("personCount").textContent=data.person_count;
   document.getElementById("phoneCount").textContent=data.phone_count;
   document.getElementById("frontCount").textContent=data.front_people;
   document.getElementById("attention").textContent=data.attention+"%";
   document.getElementById("apiStatus").textContent="正常";
   document.getElementById("detectImage").src=data.image+"?t="+Date.now();
 }catch(e){
   document.getElementById("apiStatus").textContent="连接失败";
   console.error(e);
 }
 index=index>=maxImage?1:index+1;
}
clock();
updateDashboard();
setInterval(clock,1000);
setInterval(updateDashboard,1500);
</script>
</body>
</html>
