<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <title>智慧课堂实时人数检测</title>

    <style>
        body {
            margin: 0;
            background: #0b1320;
            font-family: Arial;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        #count {
            font-size: 40px;
            color: #00ffd5;
            margin: 10px;
        }

        #img {
            width: 80%;
            max-height: 70vh;
            border: 3px solid #00ffd5;
            border-radius: 10px;
            margin-top: 10px;
        }

        #status {
            margin-top: 10px;
            color: #aaa;
        }
    </style>
</head>

<body>

<h1>智慧课堂实时人数检测</h1>

<div id="count">人数：--</div>

<img id="img" src="" />

<div id="status">系统运行中...</div>

<script>
    // 当前图片序号
    let idx = 0;

    // 图像列表（对应你 backend/data/images）
    const maxImg = 10;

    let currentImg = "";

    async function fetchData(imageName) {
        try {
            const res = await fetch(`http://127.0.0.1:8000/detect?image_name=${imageName}`);
            const json = await res.json();

            document.getElementById("count").innerText =
                "人数：" + (json.person_count ?? 0);

            document.getElementById("status").innerText =
                "OK - " + imageName;

        } catch (e) {
            console.log(e);
            document.getElementById("status").innerText = "请求失败";
        }
    }

    function updateFrame() {

        const imgName = `PartA_${String(idx % maxImg).padStart(5, '0')}.jpg`;

        currentImg = imgName;

        // 更新图片
        document.getElementById("img").src =
            `../data/images/${imgName}?t=${Date.now()}`;

        // 请求后端
        fetchData(imgName);

        idx++;
    }

    // 初始加载
    updateFrame();

    // 每1.5秒刷新（不要太快）
    setInterval(updateFrame, 1500);

</script>

</body>
</html>
