<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>智慧课堂系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#081423;color:#fff;font-family:"Microsoft YaHei"}
header{height:70px;line-height:70px;text-align:center;background:#0d2238;color:#00eaff;font-size:36px;font-weight:bold}
.toolbar{padding:12px;background:#11263d;text-align:center}
select{padding:8px 16px;font-size:18px}
.container{display:flex;height:calc(100vh - 118px)}
.left{width:75%;padding:16px}
.right{width:25%;padding:16px}
.cards{display:flex;gap:12px;margin-bottom:16px}
.card{flex:1;background:#11263d;border-radius:10px;padding:16px;text-align:center}
.card h3{font-size:20px;margin-bottom:10px}
.value{font-size:42px;color:#00ff90;font-weight:bold}
.image-box{height:720px;background:#0e2034;border-radius:10px;display:flex;align-items:center;justify-content:center}
.image-box img{max-width:100%;max-height:100%;object-fit:contain}
.panel{background:#11263d;border-radius:10px;padding:18px;line-height:2;font-size:20px}
</style>
</head>
<body>
<header>智慧课堂系统</header>
<div class="toolbar">
教室：
<select id="classroom">
<option>A5-101</option><option>A5-102</option><option>A5-103</option><option>A5-104</option><option>A5-105</option>
</select>
</div>
<div class="container">
<div class="left">
<div class="cards">
<div class="card"><h3>👥 当前人数</h3><div class="value" id="personCount">0</div></div>
<div class="card"><h3>📱 玩手机人数</h3><div class="value" id="phoneCount">0</div></div>
<div class="card"><h3>🪑 前3排人数</h3><div class="value" id="frontCount">0</div></div>
<div class="card"><h3>👀 注意力</h3><div class="value" id="attention">100%</div></div>
</div>
<div class="image-box"><img
    id="detectImage"
    alt="检测结果"
    style="width:100%;height:100%;object-fit:contain;"></div>
</div>
<div class="right">
<div class="panel">
<div>状态：<span id="apiStatus">等待连接</span></div>
<div>模型:YOLOv8</div>
<div>更新时间：<span id="updateTime">--</span></div>
<div>刷新频率:1.5 秒</div>
</div>
</div>
</div>
<script>
const API = "http://127.0.0.1:8000";

window.onload = function () {

    // ==========================
    // MJPEG 视频流（只连接一次）
    // ==========================
    const img = document.getElementById("detectImage");
    img.src = API + "/api/mjpeg";

    // ==========================
    // 更新右侧状态
    // ==========================
    function setStatus(text) {
        document.getElementById("apiStatus").innerText = text;
    }

    // ==========================
    // 更新统计数据
    // ==========================
    function updateCard(data) {

        document.getElementById("personCount").innerText =
            data.person_count ?? 0;

        document.getElementById("phoneCount").innerText =
            data.phone_count ?? 0;

        document.getElementById("frontCount").innerText =
            data.front_people ?? 0;

        document.getElementById("attention").innerText =
            (data.attention ?? 100) + "%";

        document.getElementById("updateTime").innerText =
            new Date().toLocaleTimeString();

        setStatus("运行中");
    }

    // ==========================
    // 获取JSON数据
    // ==========================
    async function updateData() {

        try {

            const response = await fetch(API + "/api/frame");

            if (!response.ok) {
                throw new Error("HTTP " + response.status);
            }

            const data = await response.json();

            // 后端刚启动
            if (data.status === "loading") {
                setStatus("模型加载中...");
                return;
            }

            updateCard(data);

        }
        catch (err) {

            console.log("API连接失败：", err);

            setStatus("等待连接");
        }
    }

    // ==========================
    // MJPEG连接成功
    // ==========================
    img.onload = function () {
        console.log("MJPEG Connected");
    };

    // ==========================
    // MJPEG连接失败
    // ==========================
    img.onerror = function () {
        console.log("MJPEG Lost");

        setStatus("视频断开");

        // 2秒后自动重连
        setTimeout(function () {
            img.src = API + "/api/mjpeg?t=" + Date.now();
        }, 2000);
    };

    // ==========================
    // 启动
    // ==========================
    updateData();

    // 每1秒刷新统计数据
    setInterval(updateData, 1000);

};
</script>
