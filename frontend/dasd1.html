<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>智慧课堂大屏系统 V2</title>

    <style>
        body {
            margin: 0;
            background: #0b1220;
            color: white;
            font-family: Arial;
        }

        .title {
            text-align: center;
            font-size: 32px;
            padding: 18px;
            font-weight: bold;
        }

        /* 教室选择 */
        .toolbar {
            text-align: center;
            margin-bottom: 10px;
        }

        select {
            padding: 6px 10px;
            font-size: 16px;
        }

        /* 顶部指标 */
        .top {
            display: flex;
            justify-content: space-around;
            padding: 10px;
        }

        .card {
            background: #152238;
            width: 22%;
            border-radius: 12px;
            text-align: center;
            padding: 18px;
            box-shadow: 0 0 10px rgba(0, 255, 213, 0.1);
        }

        .value {
            font-size: 44px;
            color: #00ffd5;
            margin-top: 10px;
        }

        /* 主体区域 */
        .main {
            display: flex;
            padding: 10px;
        }

        .video {
            width: 70%;
        }

        .video img {
            width: 100%;
            border-radius: 12px;
            border: 2px solid #00ffd5;
        }

        .side {
            width: 30%;
            padding-left: 15px;
        }

        .box {
            background: #152238;
            padding: 18px;
            margin-bottom: 12px;
            border-radius: 10px;
        }

        .label {
            font-size: 16px;
            opacity: 0.8;
        }

        .num {
            font-size: 34px;
            color: #00ffd5;
            margin-top: 8px;
        }
    </style>
</head>

<body>

    <div class="title">智慧课堂系统 V1</div>

    <!-- 教室选择 -->
    <div class="toolbar">
        <select id="classroom" onchange="resetData()">
            <option value="A5-101">A5-101</option>
            <option value="A5-102">A5-102</option>
            <option value="A5-103">A5-103</option>
        </select>
    </div>

    <!-- 顶部指标 -->
    <div class="top">
        <div class="card">
            👥 当前人数
            <div id="person" class="value">0</div>
        </div>

        <div class="card">
            📱 玩手机人数
            <div id="phone" class="value">0</div>
        </div>

        <div class="card">
            🪑 前排就坐率
            <div id="front" class="value">0%</div>
        </div>

        <div class="card">
            👁 注意力
            <div id="focus" class="value">0%</div>
        </div>
    </div>

    <!-- 主体 -->
    <div class="main">

        <!-- 视频 -->
        <div class="video">
            <img id="img" src="">
        </div>

        <!-- 右侧 -->
        <div class="side">

            <div class="box">
                <div class="label">系统状态</div>
                <div class="num">RUNNING</div>
            </div>

            <div class="box">
                <div class="label">检测模型</div>
                <div class="num">YOLOv8</div>
            </div>

            <div class="box">
                <div class="label">更新频率</div>
                <div class="num">1.5s</div>
            </div>

        </div>

    </div>

    <script>

        let idx = 0;

        async function fetchData() {

            let classroom = document.getElementById("classroom").value;

            // ===== 轮播图片 =====
            idx = (idx % 5) + 1;

            document.getElementById("img").src =
                `http://127.0.0.1:8000/detect?image_name=PartA_0000${idx}.jpg&classroom=${classroom}`;

            try {
                // ===== 获取实时数据 =====
                let res = await fetch(`http://127.0.0.1:8000/realtime?classroom=${classroom}`);
                let data = await res.json();

                let person = data.person_count || 0;
                let phone = data.phone_count || 0;

                // ===== 更新UI =====
                document.getElementById("person").innerText = person;
                document.getElementById("phone").innerText = phone;

                // ===== 工程版（先保证能用）=====
                let frontRate = Math.min(100, person * 10);
                let focusRate = Math.max(0, 100 - phone * 20);

                document.getElementById("front").innerText = frontRate + "%";
                document.getElementById("focus").innerText = focusRate + "%";

            } catch (e) {
                console.log("API错误:", e);
            }
        }

        function resetData() {
            idx = 0;
        }

        setInterval(fetchData, 1500);
        fetchData();

    </script>

</body>

</html>
